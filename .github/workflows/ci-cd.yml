name: CI/CD - Gestion Vehiculos

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:

  build-and-test:
    name: Build y Test microservicios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 20
        uses: actions/setup-java@v4
        with:
          java-version: '20'
          distribution: 'temurin'

      - name: Build y test - agendamiento
        working-directory: ./agendamiento
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Build y test - garantia
        working-directory: ./garantia
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Build y test - metodoPago
        working-directory: ./metodoPago
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Build y test - reparaciones
        working-directory: ./reparaciones
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Build y test - repuesto
        working-directory: ./repuesto
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Build y test - tecnico
        working-directory: ./tecnico
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Build y test - usuario
        working-directory: ./usuario
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

      - name: Build y test - vehiculo
        working-directory: ./vehiculo
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests -B

  docker-build-push:
    name: Build y Push imágenes a ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Crear repositorios ECR si no existen
        run: |
          for service in agendamiento garantia metodopago reparaciones repuesto tecnico usuario vehiculo; do
            aws ecr describe-repositories --repository-names gestion-vehiculos/$service 2>/dev/null || \
            aws ecr create-repository --repository-name gestion-vehiculos/$service
          done

      - name: Build y Push - agendamiento
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/agendamiento:latest ./agendamiento
          docker push $ECR_REGISTRY/gestion-vehiculos/agendamiento:latest

      - name: Build y Push - garantia
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/garantia:latest ./garantia
          docker push $ECR_REGISTRY/gestion-vehiculos/garantia:latest

      - name: Build y Push - metodoPago
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/metodopago:latest ./metodoPago
          docker push $ECR_REGISTRY/gestion-vehiculos/metodopago:latest

      - name: Build y Push - reparaciones
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/reparaciones:latest ./reparaciones
          docker push $ECR_REGISTRY/gestion-vehiculos/reparaciones:latest

      - name: Build y Push - repuesto
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/repuesto:latest ./repuesto
          docker push $ECR_REGISTRY/gestion-vehiculos/repuesto:latest

      - name: Build y Push - tecnico
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/tecnico:latest ./tecnico
          docker push $ECR_REGISTRY/gestion-vehiculos/tecnico:latest

      - name: Build y Push - usuario
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/usuario:latest ./usuario
          docker push $ECR_REGISTRY/gestion-vehiculos/usuario:latest

      - name: Build y Push - vehiculo
        run: |
          docker build -t $ECR_REGISTRY/gestion-vehiculos/vehiculo:latest ./vehiculo
          docker push $ECR_REGISTRY/gestion-vehiculos/vehiculo:latest

  provision-cloud:
    name: Provisión servicios AWS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Crear cola SQS si no existe
        run: |
          aws sqs get-queue-url --queue-name gestion-vehiculos-queue 2>/dev/null || \
          aws sqs create-queue \
            --queue-name gestion-vehiculos-queue \
            --attributes VisibilityTimeout=30,MessageRetentionPeriod=86400
          echo "Cola SQS lista"

      - name: Verificar estado de servicios cloud
        run: |
          echo "Verificando recursos AWS..."
          aws sqs get-queue-url --queue-name gestion-vehiculos-queue
          aws ecr describe-repositories --query 'repositories[*].repositoryName' --output table